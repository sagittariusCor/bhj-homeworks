<!doctype html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="stylesheet" href="../../assets/css/style.css" />
    <style>
    /* Класс, который запускает анимацию */
.cookie-bounce {
    animation: bounce 0.3s ease;
}
.clicker__cookie {
    cursor: pointer;
    transition: transform 0.2s ease; /* Плавный переход для эффекта */
    margin-top: 40px;
}

/* Сама анимация прыжка */
@keyframes bounce {
    0% {
        transform: scale(1);
    }
    50% {
        transform: scale(1.2) translateY(-20px); /* Увеличиваем и поднимаем вверх */
    }
    100% {
        transform: scale(1) translateY(0);
    }
}
</style>

    <title>Игра-кликер</title>
</head>
<body>
    <header class="header">
        <div class="logo__container">
          <a href="https://netology.ru/" class="logo__link"></a>
        </div>
        <h1 class="header__title">
            Домашнее задание к занятию 1.1 «Возможности JavaScript в браузере». Игра-кликер.
        </h1>
    </header>
    <main class="content">
        <div class="card">
            <div class="clicker">
                <div class="clicker__status">
                    Всего кликов <span id="clicker__counter">0</span>
                </div>
                <div class="clicker__status">
                    Скорость клика в секунду: <span id="clicker__speed">0</span>
                </div>
                <img 
                    src="https://i.postimg.cc/T1bWdf2y/1024px-Pepperidge-Farm-Nantucket-Cookie.jpg" 
                    alt=""
                    id="cookie"
                    class="clicker__cookie"
                    width="200">
            </div>
        </div>
    </main>    
    <script src="task.js"></script>
</body>
</html>
